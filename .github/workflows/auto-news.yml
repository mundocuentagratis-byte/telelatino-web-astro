name: Auto News

on:
  workflow_dispatch:
  schedule:
    - cron: "10 7 * * *"

permissions:
  contents: write

jobs:
  generate-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-news.txt

      - name: Generate articles
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          python scripts/generate_news.py

      - name: Commit generated articles
        run: |
          git config user.name "telelatino-bot"
          git config user.email "actions@github.com"
          git add src/content scripts/processed_articles.json
          if git diff --cached --quiet; then
            echo "No hay artículos nuevos para publicar."
          else
            git commit -m "Publicar noticias automáticas"
            git push
          fi