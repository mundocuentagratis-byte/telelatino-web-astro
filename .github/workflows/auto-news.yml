name: Auto News

on:
  workflow_dispatch:
  schedule:
    - cron: "10 */4 * * *"

permissions:
  contents: write

concurrency:
  group: auto-news
  cancel-in-progress: false

jobs:
  generate-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-news.txt

      - name: Install Node dependencies
        run: |
          npm ci

      - name: Prepare content folders
        run: |
          mkdir -p src/content/blog
          mkdir -p src/content/noticias
          mkdir -p scripts/reports

      - name: Generate articles
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
        run: |
          python scripts/generate_news.py

      - name: Build Astro site
        run: |
          npm run build

      - name: Commit generated articles
        run: |
          git config user.name "telelatino-bot"
          git config user.email "actions@github.com"

          echo "Estado antes de sincronizar:"
          git status --short

          git pull --rebase --autostash origin main

          git add -A

          echo "Estado antes del commit:"
          git status --short

          if git diff --cached --quiet; then
            echo "No hay artículos nuevos para publicar."
          else
            git commit -m "Publicar noticias automáticas"
            git push
          fi